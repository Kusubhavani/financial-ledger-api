version: "3.8"

services:
  db:
    image: postgres:14
    container_name: ledger_db
    environment:
      POSTGRES_DB: ledgerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  api:
    build: .
    container_name: ledger_api
    ports:
      - "8000:8000"
    depends_on:
      - db
